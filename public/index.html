<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Release Tracker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="page">
      <section class="card" aria-labelledby="page-title">
        <div class="card__header">
          <p class="eyebrow">GitHub Release Tracker</p>
          <h1 id="page-title">Subscribe to repository releases</h1>
          <p class="description">
            Get an email notification when a new release appears in a GitHub repository.
          </p>
        </div>

        <form class="form" data-testid="subscribe-form" novalidate>
          <div class="form__field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="user@example.com"
              autocomplete="email"
              data-testid="email-input"
              required
            />
            <p class="field-hint">We will send a confirmation link to this address.</p>
          </div>

          <div class="form__field">
            <label for="repo">GitHub repository</label>
            <input
              id="repo"
              name="repo"
              type="text"
              placeholder="nodejs/node"
              autocomplete="off"
              spellcheck="false"
              data-testid="repo-input"
              required
            />
            <p class="field-hint">
              Use the owner/repository format, for example: expressjs/express.
            </p>
          </div>

          <button class="button" type="submit" data-testid="subscribe-button">Subscribe</button>
        </form>

        <div
          class="status"
          data-testid="status-message"
          role="status"
          aria-live="polite"
          hidden
        ></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
